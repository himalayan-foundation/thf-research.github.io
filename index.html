<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title is set dynamically from profile.json -->
    <title>Academic Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── TOKENS ─────────────────────────────────────────── */
      :root {
        --primary:       #500000;   /* Change this to your brand color */
        --primary-light: #7a1c1c;
        --primary-pale:  #f9f1f1;
        --cream:         #fdfaf7;
        --white:         #ffffff;
        --ink:           #1a1a1a;
        --ink-mid:       #444444;
        --ink-soft:      #777777;
        --rule:          #e8e0d8;
        --accent:        #c8a96e;
        --font-display:  "Cormorant Garamond", Georgia, serif;
        --font-body:     "DM Sans", sans-serif;
        --max:           1140px;
        --gap:           2.5rem;

        /* Legacy aliases — keep for backward compat */
        --maroon:        var(--primary);
        --maroon-light:  var(--primary-light);
        --maroon-pale:   var(--primary-pale);
      }

      /* ── RESET ──────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--ink);
        font-size: 16px;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }
      img { max-width: 100%; display: block; }

      /* ── NAV ────────────────────────────────────────────── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(253, 250, 247, 0.96);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--rule);
        padding: 0 2rem;
      }
      .nav-inner {
        max-width: var(--max);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 58px;
      }
      .nav-brand {
        font-family: var(--font-display);
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--primary);
        letter-spacing: 0.01em;
      }
      .nav-links {
        display: flex;
        gap: 1.8rem;
        list-style: none;
      }
      .nav-links a {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-mid);
        transition: color 0.2s;
      }
      .nav-links a:hover { color: var(--primary); text-decoration: none; }
      .nav-links a.active {
        color: var(--primary);
        border-bottom: 2px solid var(--primary);
        padding-bottom: 2px;
      }

      /* ── HASH ROUTING ───────────────────────────────────── */
      .section { display: none; margin-bottom: 4rem; }
      .section.active { display: block; }

      /* ── HERO ───────────────────────────────────────────── */
      .hero {
        background: var(--white);
        border-bottom: 1px solid var(--rule);
        padding: 5rem 2rem 4.5rem;
      }
      .hero-inner {
        max-width: var(--max);
        margin: 0 auto;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 3.5rem;
        align-items: start;
      }
      .hero-photo-wrap { flex-shrink: 0; line-height: 0; }
      .hero-photo {
        display: block;
        width: 220px;
        height: 280px;
        object-fit: cover;
        object-position: top center;
        border-radius: 4px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      }
      .hero-photo-placeholder {
        width: 220px;
        height: 280px;
        background: var(--primary-pale);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        font-size: 4rem;
        font-family: var(--font-display);
        font-weight: 300;
      }
      .hero-eyebrow {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 0.75rem;
      }
      .hero-name {
        font-family: var(--font-display);
        font-size: clamp(2.6rem, 5vw, 3.8rem);
        font-weight: 300;
        line-height: 1.1;
        color: var(--ink);
        margin-bottom: 0.4rem;
        letter-spacing: -0.01em;
      }
      .hero-title {
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 400;
        font-style: italic;
        color: var(--ink-mid);
        margin-bottom: 0.2rem;
      }
      .hero-dept { font-size: 0.88rem; color: var(--ink-soft); margin-bottom: 2rem; }
      .hero-rule { width: 48px; height: 2px; background: var(--primary); margin-bottom: 1.6rem; }
      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem 2rem;
        margin-bottom: 2rem;
      }
      .hero-meta-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.84rem;
        color: var(--ink-mid);
      }
      .hero-meta-item svg { color: var(--primary); flex-shrink: 0; }
      .hero-links { display: flex; flex-wrap: wrap; gap: 0.6rem; }

      /* ── BUTTONS ────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1.1rem;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border-radius: 2px;
        transition: all 0.2s;
        text-decoration: none;
      }
      .btn-primary { background: var(--primary); color: var(--white); }
      .btn-primary:hover { background: var(--primary-light); text-decoration: none; }
      .btn-outline { border: 1.5px solid var(--primary); color: var(--primary); }
      .btn-outline:hover { background: var(--primary-pale); text-decoration: none; }

      /* ── MAIN LAYOUT ────────────────────────────────────── */
      .main-wrap { max-width: var(--max); margin: 0 auto; padding: 3rem 2rem 5rem; }
      .main-content { min-width: 0; }
      .sidebar { display: none; }

      /* ── SECTION ────────────────────────────────────────── */
      .section-head {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.8rem;
      }
      .section-head h2 {
        font-family: var(--font-display);
        font-size: 1.9rem;
        font-weight: 400;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .section-head-line { flex: 1; height: 1px; background: var(--rule); }

      /* ── ABOUT ──────────────────────────────────────────── */
      .about-bio p { font-size: 0.95rem; color: var(--ink-mid); margin-bottom: 1rem; line-height: 1.8; }
      .edu-list { list-style: none; margin-top: 1.5rem; }
      .edu-list li {
        display: flex;
        gap: 1rem;
        align-items: baseline;
        padding: 0.7rem 0;
        border-bottom: 1px solid var(--rule);
        font-size: 0.88rem;
      }
      .edu-list li:last-child { border-bottom: none; }
      .edu-degree {
        font-weight: 500;
        color: var(--primary);
        min-width: 36px;
        font-family: var(--font-display);
        font-size: 1rem;
      }
      .edu-detail { color: var(--ink-mid); }
      .edu-detail strong { color: var(--ink); font-weight: 500; }
      .edu-year { margin-left: auto; color: var(--ink-soft); font-size: 0.82rem; }

      /* ── RESEARCH CARDS ─────────────────────────────────── */
      .research-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
      .research-card {
        background: var(--white);
        border: 1px solid var(--rule);
        border-top: 3px solid var(--primary);
        border-radius: 2px;
        padding: 1.4rem 1.5rem;
        transition: box-shadow 0.2s;
      }
      .research-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
      .research-card h3 {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--primary);
        margin-bottom: 0.5rem;
      }
      .research-card p { font-size: 0.85rem; color: var(--ink-mid); line-height: 1.65; }

      /* ── NEWS ───────────────────────────────────────────── */
      .news-list { list-style: none; }
      .news-item {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 1.2rem;
        padding: 1.2rem 0;
        border-bottom: 1px solid var(--rule);
      }
      .news-item:last-child { border-bottom: none; }
      .news-date {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding-top: 0.15rem;
        line-height: 1.4;
      }
      .news-title { font-size: 0.9rem; font-weight: 500; color: var(--ink); margin-bottom: 0.3rem; }
      .news-title a { color: var(--ink); }
      .news-title a:hover { color: var(--primary); }
      .news-desc { font-size: 0.84rem; color: var(--ink-soft); line-height: 1.6; }

      /* ── PUBLICATIONS ───────────────────────────────────── */
      .pub-year-group { margin-bottom: 2rem; }
      .pub-year-label {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 300;
        color: var(--primary);
        margin-bottom: 0.8rem;
        padding-bottom: 0.4rem;
        border-bottom: 2px solid var(--primary-pale);
      }
      .pub-list { list-style: none; }
      .pub-item {
        padding: 0.9rem 0 0.9rem 1rem;
        border-left: 2px solid var(--rule);
        margin-bottom: 0.8rem;
        transition: border-color 0.2s;
      }
      .pub-item:hover { border-left-color: var(--primary); }
      .pub-title { font-size: 0.92rem; font-weight: 500; color: var(--ink); margin-bottom: 0.2rem; }
      .pub-title a { color: var(--ink); }
      .pub-title a:hover { color: var(--primary); }
      .pub-authors { font-size: 0.82rem; color: var(--ink-soft); margin-bottom: 0.15rem; }
      .pub-venue { font-size: 0.82rem; color: var(--primary); font-style: italic; }
      .pub-venue span { color: var(--ink-soft); font-style: normal; }

      /* ── AWARDS ─────────────────────────────────────────── */
      .awards-list { list-style: none; }
      .award-item {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 1rem;
        align-items: baseline;
        padding: 0.85rem 0;
        border-bottom: 1px solid var(--rule);
      }
      .award-item:last-child { border-bottom: none; }
      .award-year { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; color: var(--primary); }
      .award-title { font-size: 0.88rem; color: var(--ink-mid); }
      .award-org { font-size: 0.78rem; color: var(--ink-soft); margin-top: 0.1rem; }

      /* ── STUDENTS / TEAM ────────────────────────────────── */
      .students-label {
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 1rem;
        margin-top: 1.5rem;
      }
      .students-label:first-child { margin-top: 0; }
      .students-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .student-card {
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        padding: 1rem;
        text-align: center;
        transition: box-shadow 0.2s;
      }
      .student-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
      .student-avatar {
        width: 64px; height: 64px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 0.6rem;
        border: 2px solid var(--rule);
      }
      .student-avatar-placeholder {
        width: 64px; height: 64px;
        border-radius: 50%;
        background: var(--primary-pale);
        margin: 0 auto 0.6rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 1.4rem;
        color: var(--primary);
        font-weight: 300;
      }
      .student-name { font-size: 0.82rem; font-weight: 500; color: var(--ink); }
      .student-degree { font-size: 0.75rem; color: var(--ink-soft); }
      .student-company { font-size: 0.75rem; color: var(--primary); margin-top: 0.2rem; }

      /* ── TEACHING ───────────────────────────────────────── */
      .teaching-list { list-style: none; }
      .teaching-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.85rem 1rem;
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        margin-bottom: 0.6rem;
        transition: border-color 0.2s;
      }
      .teaching-item:hover { border-color: var(--primary); }
      .teaching-name { font-size: 0.9rem; font-weight: 500; color: var(--ink); }
      .teaching-level {
        font-size: 0.75rem;
        color: var(--primary);
        background: var(--primary-pale);
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        white-space: nowrap;
      }

      /* ── CONTACT FORM ───────────────────────────────────── */
      .contact-form-field { margin-bottom: 1rem; }
      .contact-form-field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-mid);
        margin-bottom: 0.35rem;
      }
      .contact-form-field input,
      .contact-form-field select,
      .contact-form-field textarea {
        width: 100%;
        padding: 0.6rem 0.8rem;
        font-family: var(--font-body);
        font-size: 0.9rem;
        color: var(--ink);
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        outline: none;
        transition: border-color 0.2s;
      }
      .contact-form-field input:focus,
      .contact-form-field select:focus,
      .contact-form-field textarea:focus { border-color: var(--primary); }
      .contact-form-field textarea { resize: vertical; min-height: 120px; }
      .form-success {
        display: none;
        background: #f0fdf4;
        border: 1px solid #86efac;
        border-left: 3px solid #16a34a;
        border-radius: 2px;
        padding: 1rem 1.2rem;
        font-size: 0.9rem;
        color: #166534;
        margin-top: 1rem;
      }
      .form-error {
        display: none;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-left: 3px solid #dc2626;
        border-radius: 2px;
        padding: 1rem 1.2rem;
        font-size: 0.9rem;
        color: #991b1b;
        margin-top: 1rem;
      }

      /* ── SIDEBAR ────────────────────────────────────────── */
      .sidebar-card {
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .sidebar-card h3 {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--rule);
      }
      .contact-row {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        font-size: 0.84rem;
        color: var(--ink-mid);
        margin-bottom: 0.75rem;
      }
      .contact-row svg { color: var(--primary); flex-shrink: 0; margin-top: 2px; }
      .contact-row a { color: var(--primary); }
      .sidebar-links { list-style: none; }
      .sidebar-links li { margin-bottom: 0.5rem; }
      .sidebar-links a {
        font-size: 0.84rem;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .sidebar-links a:hover { text-decoration: underline; }
      .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .tag {
        font-size: 0.74rem;
        padding: 0.25rem 0.65rem;
        background: var(--primary-pale);
        color: var(--primary);
        border-radius: 20px;
        font-weight: 500;
      }

      /* ── FOOTER ─────────────────────────────────────────── */
      footer {
        background: var(--primary);
        color: rgba(255,255,255,0.75);
        padding: 2.5rem 2rem;
        text-align: center;
        font-size: 0.8rem;
      }
      footer a { color: rgba(255,255,255,0.9); }
      footer strong { color: var(--white); }

      /* ── EXPERIENCE TIMELINE ───────────────────────────── */
      .exp-list { list-style: none; position: relative; padding-left: 1.5rem; }
      .exp-list::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.5rem;
        bottom: 0.5rem;
        width: 2px;
        background: var(--rule);
      }
      .exp-item {
        position: relative;
        padding: 0.4rem 0 1.6rem 1.2rem;
      }
      .exp-item::before {
        content: "";
        position: absolute;
        left: -1.5rem;
        top: 0.6rem;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--white);
        border: 2px solid var(--primary);
      }
      .exp-item:last-child { padding-bottom: 0; }
      .exp-role {
        font-family: var(--font-display);
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.1rem;
      }
      .exp-company {
        font-size: 0.92rem;
        color: var(--primary);
        font-weight: 500;
        margin-bottom: 0.25rem;
      }
      .exp-meta {
        font-size: 0.78rem;
        color: var(--ink-soft);
        letter-spacing: 0.04em;
        margin-bottom: 0.5rem;
      }
      .exp-meta span:not(:last-child)::after { content: " · "; }
      .exp-desc { font-size: 0.86rem; color: var(--ink-mid); line-height: 1.7; }
      .exp-highlights {
        list-style: none;
        margin-top: 0.5rem;
        font-size: 0.84rem;
        color: var(--ink-mid);
      }
      .exp-highlights li {
        position: relative;
        padding-left: 1rem;
        margin-bottom: 0.25rem;
        line-height: 1.6;
      }
      .exp-highlights li::before {
        content: "→";
        position: absolute;
        left: 0;
        color: var(--primary);
      }

      /* ── PROJECTS GRID ─────────────────────────────────── */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.2rem;
      }
      .project-card {
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        padding: 1.4rem 1.5rem;
        transition: box-shadow 0.2s, transform 0.2s;
        display: flex;
        flex-direction: column;
      }
      .project-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); }
      .project-title {
        font-family: var(--font-display);
        font-size: 1.15rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.3rem;
      }
      .project-meta { font-size: 0.74rem; color: var(--primary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.6rem; }
      .project-desc { font-size: 0.86rem; color: var(--ink-mid); line-height: 1.65; margin-bottom: 0.8rem; flex: 1; }
      .project-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.8rem; }
      .project-tag {
        font-size: 0.7rem;
        padding: 0.2rem 0.55rem;
        background: var(--primary-pale);
        color: var(--primary);
        border-radius: 20px;
        font-weight: 500;
      }
      .project-link {
        font-size: 0.82rem;
        color: var(--primary);
        font-weight: 500;
      }

      /* ── SKILLS ────────────────────────────────────────── */
      .skills-group { margin-bottom: 1.6rem; }
      .skills-group:last-child { margin-bottom: 0; }
      .skills-category {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--primary);
        margin-bottom: 0.7rem;
      }
      .skills-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .skill-pill {
        font-size: 0.82rem;
        padding: 0.35rem 0.85rem;
        background: var(--white);
        border: 1px solid var(--rule);
        border-radius: 2px;
        color: var(--ink-mid);
        transition: all 0.2s;
      }
      .skill-pill:hover { border-color: var(--primary); color: var(--primary); }

      /* ── SPEAKING ─────────────────────────────────────── */
      .speaking-list { list-style: none; }
      .speaking-item {
        padding: 1rem 0;
        border-bottom: 1px solid var(--rule);
      }
      .speaking-item:last-child { border-bottom: none; }
      .speaking-title {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--ink);
        margin-bottom: 0.2rem;
      }
      .speaking-title a { color: var(--ink); }
      .speaking-title a:hover { color: var(--primary); }
      .speaking-meta {
        font-size: 0.82rem;
        color: var(--ink-soft);
      }
      .speaking-meta .venue { color: var(--primary); font-style: italic; }

      /* ── CERTIFICATIONS ────────────────────────────────── */
      .certs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1rem;
      }
      .cert-card {
        background: var(--white);
        border: 1px solid var(--rule);
        border-left: 3px solid var(--accent);
        border-radius: 2px;
        padding: 1rem 1.2rem;
      }
      .cert-name { font-size: 0.92rem; font-weight: 500; color: var(--ink); margin-bottom: 0.2rem; }
      .cert-issuer { font-size: 0.82rem; color: var(--primary); margin-bottom: 0.2rem; }
      .cert-year { font-size: 0.78rem; color: var(--ink-soft); }

      /* ── VOLUNTEERING ──────────────────────────────────── */
      .vol-list { list-style: none; }
      .vol-item {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 1.2rem;
        padding: 1rem 0;
        border-bottom: 1px solid var(--rule);
      }
      .vol-item:last-child { border-bottom: none; }
      .vol-period {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--primary);
        letter-spacing: 0.04em;
      }
      .vol-role { font-size: 0.9rem; font-weight: 500; color: var(--ink); margin-bottom: 0.15rem; }
      .vol-org { font-size: 0.82rem; color: var(--primary); margin-bottom: 0.3rem; }
      .vol-desc { font-size: 0.82rem; color: var(--ink-mid); line-height: 1.6; }

      /* ── RESPONSIVE 860px ───────────────────────────────── */
      @media (max-width: 860px) {
        .hero-inner { grid-template-columns: 1fr; gap: 2rem; }
        .hero-photo, .hero-photo-placeholder { width: 160px; height: 200px; }
        .main-wrap { grid-template-columns: 1fr; }
        .sidebar { order: -1; }
        .research-grid { grid-template-columns: 1fr; }
      }

      /* ── HAMBURGER BUTTON ───────────────────────────────── */
      .nav-hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        z-index: 200;
      }
      .nav-hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--primary);
        border-radius: 2px;
        transition: all 0.25s ease;
        transform-origin: center;
      }
      .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
      .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

      /* ── MOBILE NAV DRAWER ──────────────────────────────── */
      @media (max-width: 640px) {
        nav { padding: 0 1.2rem; }
        .nav-inner { height: 52px; position: relative; }
        .nav-brand { font-size: 1rem; }
        .nav-hamburger { display: flex; }
        .nav-links {
          display: none;
          position: fixed;
          top: 52px;
          left: 0;
          right: 0;
          background: rgba(253, 250, 247, 0.98);
          backdrop-filter: blur(12px);
          border-bottom: 2px solid var(--primary);
          flex-direction: column;
          padding: 0.5rem 0 1rem;
          z-index: 150;
          box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .nav-links.open { display: flex; }
        .nav-links li { width: 100%; }
        .nav-links a {
          display: block;
          width: 100%;
          padding: 0.85rem 1.5rem;
          font-size: 0.8rem;
          letter-spacing: 0.1em;
          border-bottom: 1px solid var(--rule);
        }
        .nav-links li:last-child a { border-bottom: none; }
        .nav-links a.active {
          background: var(--primary-pale);
          color: var(--primary);
          border-bottom: 1px solid var(--rule);
          padding-bottom: 0.85rem;
        }
        .nav-links li:last-child a.active { border-bottom: none; }
        .hero { padding: 2.5rem 1.2rem 2.5rem; }
        .hero-inner { gap: 1.5rem; }
        .hero-meta { gap: 0.6rem 1rem; }
        .hero-links { gap: 0.5rem; }
        .main-wrap { padding: 2rem 1.2rem 4rem; }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav id="top-nav"></nav>

    <!-- HERO -->
    <header class="hero">
      <div class="hero-inner" id="hero-content"></div>
    </header>

    <!-- MAIN -->
    <div class="main-wrap">
      <main class="main-content" id="main-sections"></main>
      <aside class="sidebar" id="sidebar-content"></aside>
    </div>

    <!-- FOOTER -->
    <footer id="site-footer"></footer>

    <script>
      // ── CONFIG ───────────────────────────────────────────────
      // If deploying to a subdirectory (e.g. github.com/org/repo-name),
      // set BASE to the repo name with leading slash, e.g. "/academic-page-template"
      // If deploying to root (e.g. org.github.io), set BASE to ""
      const BASE = "";

      // ── HELPERS ──────────────────────────────────────────────
      async function load(file) {
        const r = await fetch(`${BASE}/data/${file}`);
        if (!r.ok) throw new Error(`Cannot load data/${file}`);
        return r.json();
      }

      function icon(name) {
        const icons = {
          email:   `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`,
          phone:   `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.07 12 19.79 19.79 0 0 1 1 3.18 2 2 0 0 1 3 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
          office:  `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
          scholar: `<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>`,
          lab:     `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>`,
          link:    `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
          profile: `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
          globe:   `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
        };
        return icons[name] || "";
      }

      // Derive initials from any name (works for 1, 2, or 3 words)
      function initials(name) {
        return name.trim().split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
      }

      // ── RENDER NAV ───────────────────────────────────────────
      function renderNav(sections, profile) {
        const visible = sections.filter(s => s.enabled);
        document.getElementById("top-nav").innerHTML = `
          <div class="nav-inner">
            <span class="nav-brand">${profile.name}</span>
            <ul class="nav-links" id="nav-links-list">
              ${visible.map(s => `<li><a href="#${s.id}">${s.title}</a></li>`).join("")}
            </ul>
            <button class="nav-hamburger" id="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false">
              <span></span><span></span><span></span>
            </button>
          </div>`;
        const btn  = document.getElementById("nav-hamburger");
        const menu = document.getElementById("nav-links-list");
        btn.addEventListener("click", () => {
          const isOpen = menu.classList.toggle("open");
          btn.classList.toggle("open", isOpen);
          btn.setAttribute("aria-expanded", isOpen);
        });
        menu.addEventListener("click", e => {
          if (e.target.tagName === "A") {
            menu.classList.remove("open");
            btn.classList.remove("open");
            btn.setAttribute("aria-expanded", false);
          }
        });
      }

      // ── RENDER HERO ──────────────────────────────────────────
      // Reads from profile.json — no hardcoded strings here
      function renderHero(p) {
        const ini = initials(p.name);
        const photoEl = p.photo
          ? `<img class="hero-photo" src="${BASE}/${p.photo}" alt="${p.name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : "";
        const placeholderStyle = p.photo ? 'style="display:none"' : "";

        // Build hero links from the links array in profile.json
        const heroLinks = (p.links || []).map(l =>
          `<a class="btn ${l.primary ? "btn-primary" : "btn-outline"}" href="${l.url}" target="_blank">
             ${icon(l.icon || "link")} ${l.label}
           </a>`
        ).join("");

        // Build meta items (email, phone, location — whatever is in profile.json)
        const metaItems = [
          p.email    ? `<span class="hero-meta-item">${icon("email")}&nbsp;<a href="mailto:${p.email}">${p.email}</a></span>` : "",
          p.phone    ? `<span class="hero-meta-item">${icon("phone")}&nbsp;${p.phone}</span>` : "",
          p.location ? `<span class="hero-meta-item">${icon("office")}&nbsp;${p.location}</span>` : "",
          p.website  ? `<span class="hero-meta-item">${icon("globe")}&nbsp;<a href="${p.website}" target="_blank">${p.website_label || p.website}</a></span>` : "",
        ].filter(Boolean).join("");

        document.getElementById("hero-content").innerHTML = `
          <div class="hero-photo-wrap">
            ${photoEl}
            <div class="hero-photo-placeholder" ${placeholderStyle}>${ini}</div>
          </div>
          <div class="hero-text">
            <p class="hero-eyebrow">${p.eyebrow || p.university || ""}</p>
            <h1 class="hero-name">${p.name}</h1>
            <p class="hero-title">${p.title || ""}</p>
            <p class="hero-dept">${[p.department, p.affiliation].filter(Boolean).join(" &nbsp;·&nbsp; ")}</p>
            <div class="hero-rule"></div>
            <div class="hero-meta">${metaItems}</div>
            <div class="hero-links">${heroLinks}</div>
          </div>`;

        // Set page title dynamically
        document.title = `${p.name}${p.university ? " — " + p.university : ""}`;
      }

      // ── RENDER ABOUT ─────────────────────────────────────────
      function renderAbout(p) {
        const bioHtml = p.bio.map(b => `<p>${b}</p>`).join("");
        const eduHtml = (p.education || []).map(e => `
          <li>
            <span class="edu-degree">${e.degree}</span>
            <span class="edu-detail"><strong>${e.field}</strong>, ${e.institution}, ${e.location}</span>
            <span class="edu-year">${e.year}</span>
          </li>`).join("");
        const eduSection = eduHtml ? `
          <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:var(--ink);margin-top:2rem;margin-bottom:.6rem;">Education</h3>
          <ul class="edu-list">${eduHtml}</ul>` : "";
        return `<div class="about-bio">${bioHtml}</div>${eduSection}`;
      }

      // ── RENDER RESEARCH ──────────────────────────────────────
      function renderResearch(data) {
        return `<div class="research-grid">
          ${data.map(r => `
            <div class="research-card">
              <h3>${r.title}</h3>
              <p>${r.description}</p>
            </div>`).join("")}
        </div>`;
      }

      // ── RENDER NEWS ──────────────────────────────────────────
      function renderNews(data) {
        return `<ul class="news-list">
          ${data.map(n => `
            <li class="news-item">
              <span class="news-date">${n.date}</span>
              <div>
                <p class="news-title">${n.link ? `<a href="${n.link}" target="_blank">${n.title}</a>` : n.title}</p>
                <p class="news-desc">${n.description}</p>
              </div>
            </li>`).join("")}
        </ul>`;
      }

      // ── RENDER PUBLICATIONS ──────────────────────────────────
      function renderPublications(data) {
        const byYear = {};
        data.forEach(p => { if (!byYear[p.year]) byYear[p.year] = []; byYear[p.year].push(p); });
        return Object.keys(byYear).sort((a,b) => b-a).map(yr => `
          <div class="pub-year-group">
            <div class="pub-year-label">${yr}</div>
            <ul class="pub-list">
              ${byYear[yr].map(p => `
                <li class="pub-item">
                  <p class="pub-title">${p.link ? `<a href="${p.link}" target="_blank">${p.title}</a>` : p.title}</p>
                  <p class="pub-authors">${p.authors}</p>
                  <p class="pub-venue"><em>${p.venue}</em> <span>· ${p.month}</span></p>
                </li>`).join("")}
            </ul>
          </div>`).join("");
      }

      // ── RENDER AWARDS ────────────────────────────────────────
      function renderAwards(data) {
        return `<ul class="awards-list">
          ${data.map(a => `
            <li class="award-item">
              <span class="award-year">${a.year}</span>
              <div>
                <p class="award-title">${a.title}</p>
                <p class="award-org">${a.org}</p>
              </div>
            </li>`).join("")}
        </ul>`;
      }

      // ── RENDER STUDENTS / TEAM ───────────────────────────────
      function renderStudents(data) {
        function card(s, showCompany, showRole) {
          const ini = initials(s.name);
          const photo = s.photo
            ? `<img class="student-avatar" src="${BASE}/${s.photo}" alt="${s.name}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : "";
          const placeholderStyle = s.photo ? 'style="display:none"' : "";
          return `
            <div class="student-card">
              ${photo}
              <div class="student-avatar-placeholder" ${placeholderStyle}>${ini}</div>
              <p class="student-name">${s.name}</p>
              <p class="student-degree">${showRole ? (s.role || "") : (s.degree || "")}</p>
              ${showCompany && s.current_position ? `<p class="student-company">${s.current_position}</p>` : ""}
            </div>`;
        }
        const collabHtml = data.collaborators && data.collaborators.length
          ? `<p class="students-label">Collaborators</p>
             <div class="students-grid">${data.collaborators.map(s => card(s, false, true)).join("")}</div>` : "";
        const currentHtml = data.current && data.current.length
          ? `<p class="students-label">Current Members</p>
             <div class="students-grid">${data.current.map(s => card(s, false, false)).join("")}</div>` : "";
        const alumniHtml = data.alumni && data.alumni.length
          ? `<p class="students-label">Alumni</p>
             <div class="students-grid">${data.alumni.map(s => card(s, true, false)).join("")}</div>` : "";
        return `${collabHtml}${currentHtml}${alumniHtml}`;
      }

      // ── RENDER TEACHING / PROGRAMS ───────────────────────────
      function renderTeaching(data) {
        return `<ul class="teaching-list">
          ${data.map(c => `
            <li class="teaching-item">
              <span class="teaching-name">${c.name}</span>
              <span class="teaching-level">${c.level}</span>
            </li>`).join("")}
        </ul>`;
      }

      // ── RENDER CONTACT (sidebar compact) ─────────────────────
      function renderContactCompact(p) {
        return [
          p.email    ? `<div class="contact-row">${icon("email")} <span><a href="mailto:${p.email}">${p.email}</a></span></div>` : "",
          p.phone    ? `<div class="contact-row">${icon("phone")} <span>${p.phone}</span></div>` : "",
          p.location ? `<div class="contact-row">${icon("office")} <span>${p.location}</span></div>` : "",
        ].filter(Boolean).join("");
      }

      // ── RENDER CONTACT (full section) ────────────────────────
      // Uses Web3Forms if profile.form_access_key is set.
      // Otherwise falls back to a mailto link.
      function renderContact(p) {
        const intro = p.contact_intro || `${p.name} welcomes inquiries from collaborators, researchers, and partners.`;
        const collabItems = (p.collaboration_areas || []).map(c =>
          `<li style="margin-bottom:.4rem;">&#8594;&nbsp; ${c}</li>`).join("");
        const collabBlock = collabItems ? `
          <div style="background:var(--primary-pale);border-left:3px solid var(--primary);border-radius:2px;padding:1.2rem 1.5rem;margin-bottom:1.4rem;">
            <p style="font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--primary);margin-bottom:.75rem;">Collaboration Opportunities</p>
            <ul style="list-style:none;font-size:.88rem;color:var(--ink-mid);line-height:1.8;">${collabItems}</ul>
          </div>` : "";

        // Build online profiles from links array
        const profileLinks = (p.links || []).map(l =>
          `<li style="margin-bottom:.6rem;"><a href="${l.url}" target="_blank" style="font-size:.88rem;">${icon("link")} &nbsp;${l.label}</a></li>`
        ).join("");

        // Contact form — Web3Forms if key present, mailto fallback otherwise
        const formHtml = p.form_access_key ? `
          <h3 style="font-family:var(--font-display);font-size:1.3rem;font-weight:400;color:var(--ink);margin-bottom:0.3rem;">Get in Touch</h3>
          <p style="font-size:.84rem;color:var(--ink-soft);margin-bottom:1rem;line-height:1.6;">
            Use this form for research inquiries, collaborations, or any questions.
          </p>
          <form id="contact-form" onsubmit="handleFormSubmit(event)">
            <input type="hidden" name="access_key" value="${p.form_access_key}">
            <input type="hidden" name="subject" value="Website Inquiry — ${p.name}">
            <input type="hidden" name="from_name" value="${p.name}'s Website">
            <input type="checkbox" name="botcheck" style="display:none">
            <div class="contact-form-field">
              <label for="cf-name">Your Name</label>
              <input type="text" id="cf-name" name="name" required placeholder="Jane Smith">
            </div>
            <div class="contact-form-field">
              <label for="cf-email">Email Address</label>
              <input type="email" id="cf-email" name="email" required placeholder="jane@example.com">
            </div>
            <div class="contact-form-field">
              <label for="cf-type">Inquiry Type</label>
              <select id="cf-type" name="inquiry_type">
                <option value="">— Select —</option>
                <option>PhD / Research Admission</option>
                <option>Industry Collaboration</option>
                <option>Academic Partnership</option>
                <option>General Question</option>
              </select>
            </div>
            <div class="contact-form-field">
              <label for="cf-msg">Message</label>
              <textarea id="cf-msg" name="message" required placeholder="Introduce yourself and describe your inquiry…"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
              Send Message
            </button>
            <div class="form-success" id="form-success">✓ Message sent! You will hear back soon.</div>
            <div class="form-error"   id="form-error">Something went wrong. Please email directly.</div>
          </form>` : `
          <h3 style="font-family:var(--font-display);font-size:1.3rem;font-weight:400;color:var(--ink);margin-bottom:1rem;">Get in Touch</h3>
          <p style="font-size:.9rem;color:var(--ink-mid);line-height:1.8;margin-bottom:1.2rem;">
            The best way to reach out is directly by email.
          </p>
          <a class="btn btn-primary" href="mailto:${p.email}">${icon("email")} Send Email</a>`;

        return `
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2.5rem;align-items:start;">
            <div>
              <p style="font-size:.95rem;color:var(--ink-mid);line-height:1.8;margin-bottom:1.2rem;">${intro}</p>
              ${collabBlock}
              <p style="font-size:.84rem;color:var(--ink-mid);line-height:1.7;margin-bottom:1.4rem;">
                Please introduce yourself and describe your inquiry.
                All submissions are reviewed and relevant inquiries receive a response promptly.
              </p>
              <div style="background:var(--white);border:1px solid var(--rule);border-left:3px solid var(--primary);border-radius:2px;padding:1.4rem 1.6rem;margin-bottom:1.2rem;">
                <h3 style="font-family:var(--font-display);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:1rem;">Direct Contact</h3>
                ${renderContactCompact(p)}
                <div style="margin-top:1.1rem;">
                  <a class="btn btn-primary" href="mailto:${p.email}">${icon("email")} Send Email</a>
                </div>
              </div>
              ${profileLinks ? `
              <div style="background:var(--white);border:1px solid var(--rule);border-left:3px solid var(--accent);border-radius:2px;padding:1.4rem 1.6rem;">
                <h3 style="font-family:var(--font-display);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:1rem;">Online Profiles</h3>
                <ul class="sidebar-links">${profileLinks}</ul>
              </div>` : ""}
              ${p.address ? `<p style="margin-top:1.2rem;font-size:.8rem;color:var(--ink-soft);line-height:1.6;">${p.address.replace(/\n/g,"<br>")}</p>` : ""}
            </div>
            <div>${formHtml}</div>
          </div>`;
      }

      // ── WEB3FORMS SUBMIT HANDLER ──────────────────────────────
      async function handleFormSubmit(e) {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        btn.disabled = true;
        btn.textContent = "Sending…";
        document.getElementById("form-success").style.display = "none";
        document.getElementById("form-error").style.display   = "none";
        try {
          const res = await fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: new FormData(e.target),
          });
          const json = await res.json();
          if (json.success) {
            document.getElementById("form-success").style.display = "block";
            e.target.reset();
          } else {
            throw new Error(json.message);
          }
        } catch {
          document.getElementById("form-error").style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = "Send Message";
        }
      }

      // ── RENDER EXPERIENCE ────────────────────────────────────
      function renderExperience(data) {
        return `<ul class="exp-list">
          ${data.map(e => {
            const highlights = (e.highlights && e.highlights.length)
              ? `<ul class="exp-highlights">${e.highlights.map(h => `<li>${h}</li>`).join("")}</ul>` : "";
            const desc = e.description ? `<p class="exp-desc">${e.description}</p>` : "";
            const meta = [e.location, e.period || `${e.start || ""}${e.end ? " – " + e.end : (e.start ? " – Present" : "")}`]
                          .filter(Boolean).map(m => `<span>${m}</span>`).join("");
            return `
              <li class="exp-item">
                <p class="exp-role">${e.role}</p>
                <p class="exp-company">${e.company}${e.company_url ? ` <a href="${e.company_url}" target="_blank" style="font-size:.75rem;">↗</a>` : ""}</p>
                <p class="exp-meta">${meta}</p>
                ${desc}
                ${highlights}
              </li>`;
          }).join("")}
        </ul>`;
      }

      // ── RENDER PROJECTS ──────────────────────────────────────
      function renderProjects(data) {
        return `<div class="projects-grid">
          ${data.map(p => {
            const tags = (p.tags && p.tags.length)
              ? `<div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join("")}</div>` : "";
            const linkLabel = p.link_label || "View Project →";
            const link = p.link ? `<a class="project-link" href="${p.link}" target="_blank">${linkLabel}</a>` : "";
            const meta = [p.year, p.role].filter(Boolean).join(" · ");
            return `
              <div class="project-card">
                <p class="project-title">${p.title}</p>
                ${meta ? `<p class="project-meta">${meta}</p>` : ""}
                <p class="project-desc">${p.description}</p>
                ${tags}
                ${link}
              </div>`;
          }).join("")}
        </div>`;
      }

      // ── RENDER SKILLS ────────────────────────────────────────
      // Accepts either: [{ category, items: [] }, ...] OR flat array of strings
      function renderSkills(data) {
        if (Array.isArray(data) && data.length && typeof data[0] === "string") {
          return `<div class="skills-list">
            ${data.map(s => `<span class="skill-pill">${s}</span>`).join("")}
          </div>`;
        }
        return data.map(g => `
          <div class="skills-group">
            <p class="skills-category">${g.category}</p>
            <div class="skills-list">
              ${g.items.map(s => `<span class="skill-pill">${s}</span>`).join("")}
            </div>
          </div>`).join("");
      }

      // ── RENDER SPEAKING ──────────────────────────────────────
      function renderSpeaking(data) {
        return `<ul class="speaking-list">
          ${data.map(s => `
            <li class="speaking-item">
              <p class="speaking-title">${s.link ? `<a href="${s.link}" target="_blank">${s.title}</a>` : s.title}</p>
              <p class="speaking-meta">
                <span class="venue">${s.venue}</span>
                ${s.location ? ` · ${s.location}` : ""}
                ${s.date ? ` · ${s.date}` : ""}
                ${s.type ? ` · ${s.type}` : ""}
              </p>
            </li>`).join("")}
        </ul>`;
      }

      // ── RENDER CERTIFICATIONS ────────────────────────────────
      function renderCertifications(data) {
        return `<div class="certs-grid">
          ${data.map(c => `
            <div class="cert-card">
              <p class="cert-name">${c.link ? `<a href="${c.link}" target="_blank">${c.name}</a>` : c.name}</p>
              <p class="cert-issuer">${c.issuer}</p>
              <p class="cert-year">${c.year}${c.expires ? ` · Expires ${c.expires}` : ""}</p>
            </div>`).join("")}
        </div>`;
      }

      // ── RENDER VOLUNTEERING ──────────────────────────────────
      function renderVolunteer(data) {
        return `<ul class="vol-list">
          ${data.map(v => `
            <li class="vol-item">
              <span class="vol-period">${v.period || v.year || ""}</span>
              <div>
                <p class="vol-role">${v.role}</p>
                <p class="vol-org">${v.organization}${v.location ? ` · ${v.location}` : ""}</p>
                ${v.description ? `<p class="vol-desc">${v.description}</p>` : ""}
              </div>
            </li>`).join("")}
        </ul>`;
      }

      // ── SECTION RENDERER MAP ─────────────────────────────────
      async function buildSection(sec, allData) {
        switch (sec.id) {
          case "about":          return renderAbout(allData.profile);
          case "research":       return renderResearch(allData.research);
          case "news":           return renderNews(allData.news);
          case "publications":   return renderPublications(allData.publications);
          case "awards":         return renderAwards(allData.awards);
          case "students":       return renderStudents(allData.students);
          case "teaching":       return renderTeaching(allData.teaching);
          case "experience":     return renderExperience(allData.experience);
          case "projects":       return renderProjects(allData.projects);
          case "skills":         return renderSkills(allData.skills);
          case "speaking":       return renderSpeaking(allData.speaking);
          case "certifications": return renderCertifications(allData.certifications);
          case "volunteer":      return renderVolunteer(allData.volunteer);
          case "contact":        return renderContact(allData.profile);
          default:
            const d = allData[sec.id];
            if (!d) return "<p>No data found.</p>";
            return `<pre style="font-size:.8rem;color:var(--ink-mid)">${JSON.stringify(d, null, 2)}</pre>`;
        }
      }

      // ── HASH ROUTING ─────────────────────────────────────────
      function showSection(hash, sections) {
        const id = (hash || "").replace("#", "") || sections[0].id;
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".nav-links a").forEach(a => a.classList.remove("active"));
        const target = document.getElementById(id) || document.getElementById(sections[0].id);
        if (target) target.classList.add("active");
        const navLink = document.querySelector(`.nav-links a[href="#${target ? target.id : sections[0].id}"]`);
        if (navLink) navLink.classList.add("active");
        window.scrollTo(0, 0);
      }

      // ── MAIN INIT ────────────────────────────────────────────
      (async () => {
        try {
          // Always load sections + profile first
          const [sections, profile] = await Promise.all([
            load("sections.json"),
            load("profile.json"),
          ]);

          // Map of section id → data file. Only enabled sections load.
          // The keys here MUST match section IDs used in the switch statement above.
          const sectionFileMap = {
            research:       "research.json",
            news:           "news.json",
            publications:   "publications.json",
            awards:         "awards.json",
            students:       "students.json",
            teaching:       "teaching.json",
            experience:     "experience.json",
            projects:       "projects.json",
            skills:         "skills.json",
            speaking:       "speaking.json",
            certifications: "certifications.json",
            volunteer:      "volunteer.json",
          };

          // Load only the data files for sections the user enabled
          const enabledIds = sections.filter(s => s.enabled).map(s => s.id);
          const filesToLoad = enabledIds
            .filter(id => sectionFileMap[id])
            .map(id => ({ id, file: sectionFileMap[id] }));

          const allData = { profile };
          await Promise.all(filesToLoad.map(async ({ id, file }) => {
            try { allData[id] = await load(file); }
            catch (err) { console.warn(`Skipping section "${id}": ${file} not found.`); allData[id] = []; }
          }));

          renderNav(sections, profile);
          renderHero(profile);

          const visible = sections.filter(s => s.enabled);
          let mainHtml = "";
          for (const sec of visible) {
            const body = await buildSection(sec, allData);
            mainHtml += `
              <section class="section" id="${sec.id}">
                <div class="section-head">
                  <h2>${sec.title}</h2>
                  <div class="section-head-line"></div>
                </div>
                ${body}
              </section>`;
          }
          document.getElementById("main-sections").innerHTML = mainHtml;

          // Sidebar — research tags if available
          const tags = (allData.research || []).map(r => r.title);
          const sidebarTags = tags.length ? `
            <div class="sidebar-card">
              <h3>Focus Areas</h3>
              <div class="tag-cloud">${tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
            </div>` : "";

          document.getElementById("sidebar-content").innerHTML = `
            <div class="sidebar-card">
              <h3>Contact</h3>
              ${renderContactCompact(profile)}
            </div>
            <div class="sidebar-card">
              <h3>Quick Links</h3>
              <ul class="sidebar-links">
                ${(profile.links || []).map(l =>
                  `<li><a href="${l.url}" target="_blank">${icon("link")} ${l.label}</a></li>`
                ).join("")}
              </ul>
            </div>
            ${sidebarTags}`;

          document.getElementById("site-footer").innerHTML = `
            <strong>${profile.name}</strong> &nbsp;·&nbsp; ${profile.title || ""}${profile.department ? ", " + profile.department : ""}<br>
            <span style="margin-top:.3rem;display:block">
              ${profile.university || ""} &nbsp;·&nbsp;
              <a href="mailto:${profile.email}">${profile.email}</a>
            </span>`;

          showSection(window.location.hash, visible);
          window.addEventListener("hashchange", () => showSection(window.location.hash, visible));
        } catch (e) {
          console.error("Page load error:", e);
          document.body.innerHTML = `<p style="padding:2rem;color:red">Error loading page: ${e.message}.<br>Open via a local server — not file://. Run: <code>python3 -m http.server 8000</code></p>`;
        }
      })();
    </script>
  </body>
</html>
